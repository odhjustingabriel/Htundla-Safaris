{% load static %}
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" type="text/css" href="{% static 'styles.css' %}"><title>{{ title }}</title><style>:root{--brown:#481f1c;--cream:#fff8f1;--line:#ead8c8;--shadow:0 18px 45px rgba(72,31,28,.12)}body{background:linear-gradient(135deg,#fffaf4,#f7eadc 45%,#fff);font-family:Poppins,sans-serif}.wrap{padding:130px 8% 48px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:1.15rem;box-shadow:var(--shadow)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem}.button{display:inline-flex;border:0;background:var(--brown);color:#fff;border-radius:999px;padding:.72rem 1rem;text-decoration:none;font-weight:800;cursor:pointer}.field{margin:1rem 0}.field label{font-weight:800;color:var(--brown);display:block}.field input{width:100%;padding:.75rem;border:1px solid var(--line);border-radius:12px}.checks{background:var(--cream);padding:1rem;border-radius:12px}h2{color:var(--brown)}.errors{color:#b00020}</style></head><body><header><div class="logo"><img src="{% static 'htundla-mainlogo2.png' %}" alt="Htundla Safaris logo"></div><ul class="navbar"><li><a href="{% url 'superuser_dashboard' %}">Superuser Panel</a></li></ul></header><section class="wrap"><div class="card"><h2>{{ title }}</h2>{% if form.errors %}<div class="errors">{{ form.errors }}</div>{% endif %}<form method="post">{% csrf_token %}<div class="grid"><div class="field"><label>Username</label>{{ form.username }}</div><div class="field"><label>Email</label>{{ form.email }}</div><div class="field"><label>First Name</label>{{ form.first_name }}</div><div class="field"><label>Last Name</label>{{ form.last_name }}</div><div class="field"><label>Password</label>{{ form.password }}<small>{{ form.password.help_text }}</small></div></div><div class="grid"><div class="field checks"><label>{{ form.is_active }} Active</label><label>{{ form.is_staff }} Staff</label><label>{{ form.is_superuser }} Superuser</label></div><div class="field"><label>Roles</label><div class="checks">{{ form.groups }}</div></div></div><button class="button" type="submit">Save Staff User</button> <a class="button" href="{% url 'superuser_dashboard' %}">Cancel</a></form></div></section></body></html>
