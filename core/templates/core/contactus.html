{% load static %}
<!DOCTYPE html><html><head><meta charset='utf-8'><title>Contact Us</title>
<link rel="stylesheet" href="{% static 'styles.css' %}"></head><body>
<h1>Contact Us - Guided Chatbot</h1>
{% if messages %}{% for m in messages %}<p>{{ m }}</p>{% endfor %}{% endif %}
<div id="chat-box"></div>
<form id="chat-form" method="post">{% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Submit Inquiry</button>
</form>
<script>
const steps=['full_name','email','phone_number','travel_type','destination','duration_days','travel_style','group_size','interests'];
const prompts={full_name:'Your full name?',email:'Your email?',phone_number:'Phone number?',travel_type:'Travel type?',destination:'Preferred destination?',duration_days:'Trip duration (days)?',travel_style:'Travel style?',group_size:'Group size?',interests:'Select interests then submit.'};
const box=document.getElementById('chat-box');
steps.forEach((s,i)=>{const p=document.createElement('p');p.innerText=(i+1)+'. '+prompts[s];box.appendChild(p);});
const form=document.getElementById('chat-form');
form.addEventListener('submit',(e)=>{const email=form.querySelector('[name=email]').value; if(!/.+@.+\..+/.test(email)){alert('Invalid email');e.preventDefault();}
const d=parseInt(form.querySelector('[name=duration_days]').value||'0',10);const t=form.querySelector('[name=travel_type]').value;if(t==='Safari'&&(d<3||d>5)){alert('Safari duration must be 3-5 days');e.preventDefault();}})
</script>
</body></html>
