{% load static %}
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="stylesheet" type="text/css" href="{% static 'styles.css' %}"><title>{{ title }}</title><style>:root{--brown:#481f1c;--cream:#fff8f1;--line:#ead8c8;--shadow:0 18px 45px rgba(72,31,28,.12)}body{background:linear-gradient(135deg,#fffaf4,#f7eadc 45%,#fff);font-family:Poppins,sans-serif}.wrap{padding:130px 8% 48px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:1.15rem;box-shadow:var(--shadow)}.button{display:inline-flex;border:0;background:var(--brown);color:#fff;border-radius:999px;padding:.72rem 1rem;text-decoration:none;font-weight:800;cursor:pointer}.field{margin:1rem 0}.field label{font-weight:800;color:var(--brown)}.field input{width:100%;padding:.75rem;border:1px solid var(--line);border-radius:12px}.checks{columns:2;max-height:460px;overflow:auto;background:var(--cream);padding:1rem;border-radius:12px}h2{color:var(--brown)}</style></head><body><header><div class="logo"><img src="{% static 'htundla-mainlogo2.png' %}" alt="Htundla Safaris logo"></div><ul class="navbar"><li><a href="{% url 'superuser_dashboard' %}">Superuser Panel</a></li></ul></header><section class="wrap"><div class="card"><h2>{{ title }}</h2><form method="post">{% csrf_token %}<div class="field"><label for="id_name">Role Name</label>{{ form.name }}</div><div class="field"><label>Permissions</label><div class="checks">{{ form.permissions }}</div></div><button class="button" type="submit">Save Role</button> <a class="button" href="{% url 'superuser_dashboard' %}">Cancel</a></form></div></section></body></html>
